<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title>Passphrase Generator</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>

    <body class="bg-light">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="text-center mb-4">
                        <h2>🔒 Passphrase Generator</h2>
                        <p class="text-muted">Generate secure Diceware passphrases</p>
                    </div>

                    <div class="card shadow-sm p-4">
                        <div class="mb-3">
                            <label class="form-label">Number of words</label>
                            <input type="number" id="words" class="form-control" value="5" min="2" max="12">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Wordlist</label>
                            <select id="wordlist" class="form-select">
                                <option value="en">English</option>
                                <option value="it">Italian</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Separator</label>
                            <input type="text" id="separator" class="form-control" value="-">
                        </div>

                        <button class="btn btn-primary w-100 mb-4" onclick="generate()">
                            Generate Passphrase
                        </button>

                        <div class="result-box p-3 mb-3">
                            <span id="result"></span>
                        </div>

                        <div class="text-center mb-3">
                            <button class="btn btn-outline-secondary btn-sm" onclick="copyPassphrase()">
                            Copy
                            </button>
                        </div>

                        <div class="mb-1">
                            <strong>Entropy:</strong>
                            <span id="entropy"></span>
                        </div>

                        <div class="progress mb-2">
                            <div id="entropyBar" class="progress-bar"></div>
                        </div>

                        <small class="text-muted">
                            Estimated crack time:
                            <span id="crack"></span>
                        </small>
                    </div>
                </div>
            </div>
        </div>

        <script src="wordlists.js"></script>
        <script src="app.js"></script>
    </body>
</html>
